<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' blob: https://d3js.org 'unsafe-inline'">
    <title>AGBERO ADMIN</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // polyfill - prevents Oja event delegation crashes on non-element targets
        // Safely stubs closest() for Document, Window, and Text nodes
        [Document, Window, Text].forEach(function(type) {
            if (typeof type !== 'undefined' && type.prototype && !type.prototype.closest) {
                type.prototype.closest = function() { return null; };
            }
        });

        document.documentElement.setAttribute(
            'data-theme', localStorage.getItem('theme') || 'light'
        );
    </script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/graph.js"></script>
</head>
<body id="shell">
</body>
<script type="module" src="js/main.js"></script>
</html>
