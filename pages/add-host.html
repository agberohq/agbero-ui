<div class="page active add-host-page">

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <button class="btn small" id="addHostBackBtn" style="color:var(--text-mute);">← Hosts</button>
        <div>
            <h2 style="margin:0;font-size:17px;font-weight:400;">Add New Host</h2>
            <p style="margin:3px 0 0;font-size:12px;color:var(--text-mute);">Configure a new virtual host on this Agbero node.</p>
        </div>
    </div>

    <div class="add-host-steps" id="addHostSteps">
        <div class="add-host-step active" data-step="0"><span class="add-host-step-num">1</span> Type</div>
        <span class="add-host-step-sep">›</span>
        <div class="add-host-step" data-step="1"><span class="add-host-step-num">2</span> Domain</div>
        <span class="add-host-step-sep">›</span>
        <div class="add-host-step" data-step="2"><span class="add-host-step-num">3</span> Routes</div>
        <span class="add-host-step-sep">›</span>
        <div class="add-host-step" data-step="3"><span class="add-host-step-num">4</span> Review</div>
    </div>

    <div id="draftResumeBanner" class="draft-resume-banner" style="display:none;">
        <span style="font-size:18px;">📋</span>
        <div style="flex:1;">
            <div style="font-weight:500;">You have an unfinished host configuration</div>
            <div id="draftResumeDesc" style="font-size:12px;color:var(--text-mute);margin-top:2px;"></div>
        </div>
        <button class="btn primary small" id="draftResumeBtn">Resume</button>
        <button class="btn small" id="draftDiscardBtn">Start fresh</button>
    </div>

    <div id="addHostContent"></div>

    <div id="addHostNav" style="display:none;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--border);">
        <button class="btn" id="addHostPrevBtn">← Back</button>
        <div id="addHostValidError" style="color:var(--danger);font-size:12px;flex:1;text-align:center;padding:0 12px;display:none;"></div>
        <button class="btn primary" id="addHostNextBtn">Continue →</button>
    </div>
</div>

<script type="module">
import { component, emit, on, notify, query, queryAll, tabs, collapse } from '../lib/oja.full.esm.js';
import { addHost, checkHostExists } from '../js/api.js';
import { buildHostConfig } from '../js/host-builder.js';

// ── Draft (sessionStorage only — cleared on success) ─────────────────────────
const DRAFT_KEY = 'agbero-add-host-draft';
function saveDraft(d)  { try { sessionStorage.setItem(DRAFT_KEY, JSON.stringify(d)); } catch {} }
function loadDraft()   { try { return JSON.parse(sessionStorage.getItem(DRAFT_KEY)||'null'); } catch { return null; } }
function clearDraft()  { sessionStorage.removeItem(DRAFT_KEY); }

// ── State ─────────────────────────────────────────────────────────────────────
let _step = 0, _draft = {}, _routes = [_newRoute('/')], _activeRouteId = '', _routeTabHandle = null;
_activeRouteId = _routes[0].id;

function _newRoute(path) {
    return { id:'r'+Date.now()+Math.random().toString(36).slice(2,6), path:path||'/', engineData:{}, extras:{}, authData:{} };
}

// ── Draft resume ──────────────────────────────────────────────────────────────
const _saved = loadDraft();
if (_saved?.host_type) {
    const banner = query('#draftResumeBanner'), desc = query('#draftResumeDesc');
    if (banner) banner.style.display = '';
    if (desc)   desc.textContent = _saved.domain ? `Unfinished config for "${_saved.domain}" (${_saved.host_type})` : `Unfinished ${_saved.host_type} host`;
    on('#draftResumeBtn',  'click', () => { _draft=_saved; _routes=_saved._routes||[_newRoute('/')]; _activeRouteId=_routes[0]?.id||''; _step=_saved._step||0; if(banner) banner.style.display='none'; renderStep(); });
    on('#draftDiscardBtn', 'click', () => { clearDraft(); if(banner) banner.style.display='none'; renderStep(); });
} else { renderStep(); }

on('#addHostBackBtn', 'click', () => emit('app:navigate', { path: '/hosts' }));

// ── Breadcrumb ────────────────────────────────────────────────────────────────
function _updateSteps() {
    queryAll('#addHostSteps .add-host-step').forEach((el,i) => {
        el.classList.toggle('active', i===_step); el.classList.toggle('done', i<_step);
        const n=el.querySelector('.add-host-step-num'); if(n) n.textContent=i<_step?'✓':String(i+1);
    });
    const nav=query('#addHostNav'); if(nav) nav.style.display=_step===0?'none':'flex';
    const nb=query('#addHostNextBtn'); if(nb) nb.style.display=_step===3?'none':'';
}

function renderStep() {
    _updateSteps();
    const el=query('#addHostContent'); if(!el) return;
    if(_step===0) _renderTypeStep(el);
    else if(_step===1) _renderDomainStep(el);
    else if(_step===2) _renderRoutesStep(el);
    else _renderReviewStep(el);
}

// ════════════════════ STEP 0 — Type ══════════════════════════════════════════
function _renderTypeStep(el) {
    el.innerHTML = `
    <div class="host-type-grid">
        ${[
            {type:'web',        icon:'🌐',title:'Web / Frontend',   sub:'Static files, SPA, PHP, Markdown, Git deploy',
             feats:['Serve files from any directory on disk','Git-based auto-deploy with webhooks','Markdown — website or browse mode','PHP-FPM via FastCGI']},
            {type:'proxy',      icon:'⚡',title:'Backend / Proxy',  sub:'Reverse proxy to upstream services',
             feats:['Load balancing: round-robin, least-conn, sticky, adaptive','Health checks and circuit breaker','Rate limiting, CORS, caching','JWT / Basic / Forward auth']},
            {type:'serverless', icon:'λ', title:'Serverless',       sub:'Managed workers and REST proxy endpoints',
             feats:['HTTP-triggered, cron, background, or run-once workers','REST proxies with server-side credential injection','Git-sourced worker code with auto-deploy','env.VAR keeps secrets off the browser']},
            {type:'advanced',   icon:'⚙️',title:'Advanced',         sub:'Write the full host configuration as JSON',
             feats:['Full control over every config field','Mix web, proxy, serverless, TCP proxy on one host','Validated before submission','For power users only']},
        ].map(c=>`
        <button class="host-type-card${_draft.host_type===c.type?' selected':''}" data-type="${c.type}">
            <span class="htc-icon">${c.icon}</span>
            <div class="htc-body"><strong>${c.title}</strong><span>${c.sub}</span>
                <ul class="htc-features">${c.feats.map(f=>`<li>${f}</li>`).join('')}</ul>
            </div><span class="htc-arrow">→</span>
        </button>`).join('')}
    </div>`;
    el.querySelectorAll('.host-type-card').forEach(card => {
        card.addEventListener('click', () => {
            el.querySelectorAll('.host-type-card').forEach(c=>c.classList.remove('selected'));
            card.classList.add('selected'); _draft.host_type=card.dataset.type;
            saveDraft({..._draft,_routes,_step:0});
            setTimeout(() => { _step=_draft.host_type==='advanced'?3:1; renderStep(); }, 160);
        });
    });
}

// ════════════════════ STEP 1 — Domain & TLS ══════════════════════════════════
function _isLocalDomain(d) {
    const h=(d||'').trim().toLowerCase();
    if(!h) return false;
    if(/^\d+\.\d+\.\d+\.\d+$/.test(h)) return true;
    return ['localhost','.localhost','.local','.internal','.test','.example'].some(s=>h===s.replace('.','') || h.endsWith(s));
}

function _renderDomainStep(el) {
    const d=_draft, isLocal=_isLocalDomain(d.domain||''), showCert=d.tls_mode==='local'&&!isLocal;
    el.innerHTML=`
    <div class="wz-field-group">
        <label class="wz-label">Domain <span style="color:var(--danger)">*</span></label>
        <div style="position:relative;">
            <input type="text" id="wzDomainInput" class="wz-input" placeholder="app.example.com" autocomplete="off" spellcheck="false" value="${_esc(d.domain||'')}">
            <span id="wzDomainStatus" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;"></span>
        </div>
        <div class="wz-hint">No protocol prefix — e.g. <code>app.example.com</code> or <code>localhost</code></div>
    </div>
    <div class="wz-field-group wz-collapsible${isLocal?' wz-collapsed':''}" id="wzTLSSection">
        <label class="wz-label">TLS Mode</label>
        <div class="wz-radio-group">
            <label class="wz-radio"><input type="radio" name="tls_mode" value="auto"${(!d.tls_mode||d.tls_mode==='auto')?' checked':''}> <span>Auto — Let's Encrypt (recommended)</span></label>
            <label class="wz-radio"><input type="radio" name="tls_mode" value="local"${d.tls_mode==='local'?' checked':''}> <span>Local certificate (provide cert + key file paths)</span></label>
            <label class="wz-radio"><input type="radio" name="tls_mode" value="none"${d.tls_mode==='none'?' checked':''}> <span>None — HTTP only</span></label>
        </div>
        <div class="wz-hint">Local/dev domains (*.localhost, .local, IPs) inherit global TLS config — no TLS block is sent.</div>
    </div>
    <div class="wz-field-group wz-collapsible${showCert?'':' wz-collapsed'}" id="wzLocalCertFields">
        <label class="wz-label">Certificate file <span style="color:var(--danger)">*</span></label>
        <div class="wz-path-row"><input type="text" id="wzTLSCert" class="wz-input" placeholder="/etc/ssl/certs/example.pem" value="${_esc(d.tls_cert||'')}"></div>
        <label class="wz-label" style="margin-top:8px;">Key file <span style="color:var(--danger)">*</span></label>
        <div class="wz-path-row"><input type="text" id="wzTLSKey" class="wz-input" placeholder="/etc/ssl/private/example.key" value="${_esc(d.tls_key||'')}"></div>
        <div class="wz-hint" style="margin-top:6px;">Both paths must be absolute and readable by the Agbero process.</div>
    </div>`;

    let _ct=null;
    const di=el.querySelector('#wzDomainInput'), st=el.querySelector('#wzDomainStatus'),
          ts=el.querySelector('#wzTLSSection'),  cf=el.querySelector('#wzLocalCertFields');

    function _cv() { const lr=el.querySelector('[name="tls_mode"][value="local"]'),loc=_isLocalDomain(di?.value||''); if(cf) cf.classList.toggle('wz-collapsed',loc||!lr?.checked); }
    function _tv() { const loc=_isLocalDomain(di?.value||''); if(ts) ts.classList.toggle('wz-collapsed',loc); if(loc){if(cf)cf.classList.add('wz-collapsed');el.querySelectorAll('[name="tls_mode"]').forEach(r=>r.checked=false);}else _cv(); }

    el.querySelectorAll('[name="tls_mode"]').forEach(r=>r.addEventListener('change',()=>{_draft.tls_mode=r.value;_cv();}));
    di?.addEventListener('input',()=>{ _draft.domain=di.value.trim().toLowerCase(); _tv(); clearTimeout(_ct); if(st) st.textContent='';
        const v=_draft.domain; if(!v||v.includes('://')||v.length<3) return;
        _ct=setTimeout(async()=>{ try{const e=await checkHostExists(v);if(st){st.textContent=e?'⚠ already exists':'✓ available';st.style.color=e?'var(--warning)':'var(--success)';}}catch{} },600);
    });
    el.querySelector('#wzTLSCert')?.addEventListener('input',e=>_draft.tls_cert=e.target.value);
    el.querySelector('#wzTLSKey')?.addEventListener('input',e=>_draft.tls_key=e.target.value);

    _wireNav(()=>{
        const dom=(_draft.domain||'').trim();
        if(!dom) return 'Domain is required';
        if(dom.includes('://')) return 'Domain must not include a protocol prefix';
        if(dom.includes('..'))  return 'Invalid domain';
        if(_draft.tls_mode==='local'&&!_isLocalDomain(dom)){
            if(!(_draft.tls_cert||'').trim()) return 'Certificate file path is required for local TLS';
            if(!(_draft.tls_key||'').trim())  return 'Key file path is required for local TLS';
        }
        return null;
    });
}

// ════════════════════ STEP 2 — Routes ═════════════════════════════════════════
function _renderRoutesStep(el) {
    el.innerHTML=`
    <div id="wzRouteTabs" style="margin-bottom:10px;"></div>
    <div id="wzRoutePanels"></div>
    <button type="button" class="btn small" id="wzAddRouteBtn" style="margin-top:10px;">+ Add Route</button>
    <input type="hidden" id="wzRoutesDataField" value="[]">`;

    const tabNavEl=el.querySelector('#wzRouteTabs'), panelsEl=el.querySelector('#wzRoutePanels'),
          fieldEl=el.querySelector('#wzRoutesDataField'), hostType=_draft.host_type||'proxy';

    function syncField(){ if(fieldEl) fieldEl.value=JSON.stringify(_routes); }

    function renderRoutePanel(route) {
        const div=document.createElement('div'); div.setAttribute('data-tab',route.id); div.style.padding='2px 0';

        // Path
        const pathRow=document.createElement('div'); pathRow.className='wz-field-group';
        pathRow.innerHTML=`<label class="wz-label">Route Path</label>
            <input type="text" class="wz-input wz-route-path" placeholder="/api" value="${_esc(route.path)}">
            <div class="wz-hint">Must start with <code>/</code></div>`;
        pathRow.querySelector('.wz-route-path').addEventListener('input',e=>{ route.path=e.target.value; syncField(); rebuildTabs(); });
        div.appendChild(pathRow);

        // Sub-tabs
        const subTabNav=document.createElement('div'); subTabNav.id='wzSubTabs_'+route.id;
        const subPanels=document.createElement('div'); subPanels.id='wzSubPanels_'+route.id;
        div.appendChild(subTabNav); div.appendChild(subPanels);

        const enginePanel=document.createElement('div'); enginePanel.style.paddingTop='12px';
        _buildEnginePanel(enginePanel, route, hostType);

        const extrasPanel=document.createElement('div'); extrasPanel.style.cssText='padding-top:12px;display:none;';
        extrasPanel.innerHTML=_extrasHTML(route); _wireToggleCards(extrasPanel);

        const authPanel=document.createElement('div'); authPanel.style.cssText='padding-top:12px;display:none;';
        authPanel.innerHTML=_authHTML(route); _wireToggleCards(authPanel);

        subPanels.appendChild(enginePanel); subPanels.appendChild(extrasPanel); subPanels.appendChild(authPanel);
        const subPanelMap={engine:enginePanel,extras:extrasPanel,auth:authPanel};
        tabs.render(subTabNav,[{key:'engine',label:'Engine'},{key:'extras',label:'Extras'},{key:'auth',label:'Auth'}],{
            active:'engine',variant:'pill',onChange:k=>Object.entries(subPanelMap).forEach(([k2,p])=>{ p.style.display=k2===k?'':'none'; })
        });

        div.addEventListener('change',()=>{ _collectRouteData(div,route); syncField(); });
        div.addEventListener('input', ()=>{ _collectRouteData(div,route); syncField(); });
        panelsEl.appendChild(div);
    }

    function rebuildTabs() {
        _routeTabHandle=tabs.render(tabNavEl,_routes.map(r=>({key:r.id,label:r.path||'/'})),{
            panels:panelsEl, active:_activeRouteId, variant:'line',
            onChange:k=>{ _activeRouteId=k; }
        });
    }

    _routes.forEach(r=>renderRoutePanel(r)); rebuildTabs(); syncField();

    el.querySelector('#wzAddRouteBtn').addEventListener('click',()=>{
        const nr=_newRoute('/new'); _routes.push(nr); _activeRouteId=nr.id;
        renderRoutePanel(nr); rebuildTabs(); syncField();
    });

    _wireNav(()=>{
        if(!_routes.length) return 'Add at least one route';
        for(const r of _routes){
            if(!r.path?.startsWith('/')) return 'Route path must start with /';
            if(r.engineData?.web_static_on&&!(r.engineData?.web_root||'').trim())
                return `Route "${r.path}": Static Files requires a root directory path`;
            if(r.engineData?.git_enabled&&!(r.engineData?.git_url||'').trim())
                return `Route "${r.path}": Git Deploy requires a repository URL`;
        }
        return null;
    });
}

function _buildEnginePanel(el, route, hostType) {
    if(hostType==='web')        { el.innerHTML=_webEngineHTML(route); _wireToggleCards(el); _wireWebEngine(el,route); }
    else if(hostType==='proxy') { el.innerHTML=_proxyEngineHTML(route); _wireProxyEngine(el,route); }
    else if(hostType==='serverless') { el.innerHTML=_serverlessEngineHTML(); _wireServerlessEngine(el,route); }
}

// ── Web engine (full — all original fields) ────────────────────────────────
function _webEngineHTML(route) {
    const ed=route.engineData||{};
    return `<div class="wz-toggle-grid">
        <div class="wz-toggle-card">
            <div class="wz-toggle-header" data-action="wz-toggle" data-target="wztStatic_${route.id}">
                <div><strong>Static Files</strong><span class="wz-toggle-sub">Serve a directory from disk</span></div>
                <label class="wz-switch" onclick="event.stopPropagation()"><input type="checkbox" data-wz-route-field="engineData.web_static_on"${ed.web_static_on?' checked':''}><span class="wz-slider"></span></label>
            </div>
            <div class="wz-toggle-body" id="wztStatic_${route.id}" style="display:none;">
                <div class="wz-path-row">
                    <input type="text" data-wz-route-field="engineData.web_root" class="wz-input" placeholder="/var/www/html" value="${_esc(ed.web_root||'')}">
                </div>
                <div class="wz-hint">Full absolute server path — e.g. /var/www/html</div>
                <div class="wz-inline-checks" style="margin-top:8px;">
                    <label class="wz-check"><input type="checkbox" data-wz-route-field="engineData.web_listing"${ed.web_listing?' checked':''}> Directory listing</label>
                    <label class="wz-check"><input type="checkbox" data-wz-route-field="engineData.web_spa"${ed.web_spa?' checked':''}> SPA mode (fallback to index.html)</label>
                    <label class="wz-check"><input type="checkbox" data-wz-route-field="engineData.web_nocache"${ed.web_nocache?' checked':''}> Disable caching headers</label>
                </div>
                <div style="margin-top:10px;">
                    <label class="wz-label" style="font-size:11px;">Index files (comma-separated, no paths)</label>
                    <input type="text" data-wz-route-field="engineData.web_index" class="wz-input"
                           placeholder="index.html, index.php, index.md, README.md" value="${_esc(ed.web_index||'')}">
                    <div class="wz-hint">Files tried in order when a directory is requested. No slashes.</div>
                </div>
            </div>
        </div>
        <div class="wz-toggle-card">
            <div class="wz-toggle-header" data-action="wz-toggle" data-target="wztPHP_${route.id}">
                <div><strong>PHP</strong><span class="wz-toggle-sub">via PHP-FPM FastCGI</span></div>
                <label class="wz-switch" onclick="event.stopPropagation()"><input type="checkbox" data-wz-route-field="engineData.php_enabled"${ed.php_enabled?' checked':''}><span class="wz-slider"></span></label>
            </div>
            <div class="wz-toggle-body" id="wztPHP_${route.id}" style="display:none;">
                <input type="text" data-wz-route-field="engineData.php_address" class="wz-input"
                       placeholder="127.0.0.1:9000 or unix:/run/php/php8.sock" value="${_esc(ed.php_address||'')}">
                <div class="wz-hint">Leave blank for default (127.0.0.1:9000)</div>
            </div>
        </div>
        <div class="wz-toggle-card">
            <div class="wz-toggle-header" data-action="wz-toggle" data-target="wztGit_${route.id}">
                <div><strong>Git Deploy</strong><span class="wz-toggle-sub">Pull + optional webhook trigger</span></div>
                <label class="wz-switch" onclick="event.stopPropagation()"><input type="checkbox" data-wz-route-field="engineData.git_enabled"${ed.git_enabled?' checked':''}><span class="wz-slider"></span></label>
            </div>
            <div class="wz-toggle-body" id="wztGit_${route.id}" style="display:none;">
                <input type="text" data-wz-route-field="engineData.git_url" class="wz-input"
                       placeholder="https://github.com/org/repo.git" value="${_esc(ed.git_url||'')}" style="margin-bottom:6px;">
                <div style="display:flex;gap:8px;margin-bottom:6px;">
                    <input type="text" data-wz-route-field="engineData.git_branch" class="wz-input" placeholder="Branch (default: main)" value="${_esc(ed.git_branch||'')}" style="flex:1;">
                    <input type="text" data-wz-route-field="engineData.git_id" class="wz-input" placeholder="Deploy ID (e.g. my-site)" value="${_esc(ed.git_id||'')}" style="flex:1;">
                </div>
                <div class="wz-hint" style="margin-bottom:10px;">Webhook: <code style="font-size:10px;">https://{domain}/.well-known/agbero/webhook/git/{id}</code></div>
                <div style="display:flex;gap:8px;margin-bottom:6px;">
                    <div style="flex:1;"><label class="wz-label" style="font-size:11px;">Poll interval (Pull mode)</label>
                        <input type="text" data-wz-route-field="engineData.git_interval" class="wz-input" placeholder="e.g. 5m — blank = webhook only" value="${_esc(ed.git_interval||'')}"></div>
                    <div style="flex:1;"><label class="wz-label" style="font-size:11px;">Webhook secret (Push mode)</label>
                        <input type="text" data-wz-route-field="engineData.git_secret" class="wz-input" placeholder="Must match GitHub/GitLab setting" value="${_esc(ed.git_secret||'')}"></div>
                </div>
                <label class="wz-label" style="font-size:11px;margin-top:4px;">Auth (private repos)</label>
                <select data-wz-route-field="engineData.git_auth_type" class="wz-select-inline" style="margin-bottom:6px;">
                    <option value="">None (public)</option>
                    <option value="basic"${ed.git_auth_type==='basic'?' selected':''}>Basic (username / password)</option>
                    <option value="ssh-key"${ed.git_auth_type==='ssh-key'?' selected':''}>SSH Key</option>
                    <option value="ssh-agent"${ed.git_auth_type==='ssh-agent'?' selected':''}>SSH Agent</option>
                </select>
                <div class="wz-git-auth-fields"></div>
            </div>
        </div>
        <div class="wz-toggle-card">
            <div class="wz-toggle-header" data-action="wz-toggle" data-target="wztMd_${route.id}">
                <div><strong>Markdown</strong><span class="wz-toggle-sub">Render .md files as HTML</span></div>
                <label class="wz-switch" onclick="event.stopPropagation()"><input type="checkbox" data-wz-route-field="engineData.markdown_enabled"${ed.markdown_enabled?' checked':''}><span class="wz-slider"></span></label>
            </div>
            <div class="wz-toggle-body" id="wztMd_${route.id}" style="display:none;">
                <div class="wz-field-group" style="margin-bottom:10px;">
                    <label class="wz-label" style="font-size:11px;">Mode</label>
                    <div class="wz-radio-group" style="flex-direction:row;gap:16px;">
                        <label class="wz-radio"><input type="radio" name="md_view_${route.id}" data-wz-route-field="engineData.markdown_view" value=""${!ed.markdown_view?' checked':''}> <span>Website — rendered pages</span></label>
                        <label class="wz-radio"><input type="radio" name="md_view_${route.id}" data-wz-route-field="engineData.markdown_view" value="browse"${ed.markdown_view==='browse'?' checked':''}> <span>Browse — document manager</span></label>
                    </div>
                    <div class="wz-hint">Browse mode shows a navigable file tree with rendered previews.</div>
                </div>
                <div class="wz-inline-checks">
                    <label class="wz-check"><input type="checkbox" data-wz-route-field="engineData.markdown_toc"${ed.markdown_toc?' checked':''}> Table of contents</label>
                    <label class="wz-check"><input type="checkbox" data-wz-route-field="engineData.markdown_highlight"${ed.markdown_highlight?' checked':''}> Syntax highlighting</label>
                    <label class="wz-check"><input type="checkbox" data-wz-route-field="engineData.markdown_unsafe"${ed.markdown_unsafe?' checked':''}> Allow raw HTML in markdown</label>
                </div>
            </div>
        </div>
    </div>`;
}

function _wireWebEngine(el, route) {
    const authSel=el.querySelector('[data-wz-route-field="engineData.git_auth_type"]');
    const authBox=el.querySelector('.wz-git-auth-fields');
    function updateGitAuth(){
        if(!authBox) return;
        const v=authSel?.value||'', ed=route.engineData||{};
        authBox.innerHTML=v==='basic'?`

function _wireProxyEngine(el, route) {
    let backends=[];
    try{ backends=JSON.parse(route.engineData?.backends_list||'[]'); }catch{}
    if(!backends.length) backends=[{address:'',weight:1}];
    const listEl=el.querySelector('#wzProxyBackends_'+route.id), fieldEl=el.querySelector('.wz-backends-field'), addBtn=el.querySelector('.wz-add-backend');
    function syncField(){ if(fieldEl){fieldEl.value=JSON.stringify(backends);route.engineData=route.engineData||{};route.engineData.backends_list=fieldEl.value;} }
    function render(){
        if(!listEl) return;
        listEl.innerHTML=backends.map((b,i)=>`
            <div class="wz-backend-row" data-idx="${i}">
                <input type="text" class="wz-input wz-be-addr" value="${_esc(b.address||'')}" placeholder="http://10.0.0.5:8080 or unix:/run/app.sock" style="flex:1;">
                <input type="number" class="wz-input-sm wz-be-weight" value="${b.weight||1}" min="1" max="100" title="Weight" style="width:60px;">
                <span class="wz-hint-inline" style="font-size:10px;white-space:nowrap;">weight</span>
                <button type="button" class="btn small wz-be-remove" style="color:var(--danger);border-color:var(--danger);padding:4px 8px;" title="Remove">✕</button>
            </div>`).join('');
        listEl.querySelectorAll('.wz-be-addr').forEach((inp,i)=>inp.addEventListener('input',()=>{backends[i].address=inp.value;syncField();}));
        listEl.querySelectorAll('.wz-be-weight').forEach((inp,i)=>inp.addEventListener('input',()=>{backends[i].weight=Number(inp.value)||1;syncField();}));
        listEl.querySelectorAll('.wz-be-remove').forEach(btn=>btn.addEventListener('click',()=>{backends.splice(+btn.closest('[data-idx]').dataset.idx,1);render();}));
    }
    addBtn?.addEventListener('click',()=>{backends.push({address:'',weight:1});render();listEl?.querySelectorAll('.wz-be-addr')[backends.length-1]?.focus();});
    render(); syncField();
}

function _wireServerlessEngine(el, route) {
    const rp=el.querySelector('#wzSlPanelRests'), wp=el.querySelector('#wzSlPanelWorkers');
    tabs.render(el.querySelector('#wzSlTabNav'),[{key:'rests',label:'REST Proxies'},{key:'workers',label:'Workers'}],{
        active:'rests',variant:'pill',onChange:k=>{if(rp)rp.style.display=k==='rests'?'':'none';if(wp)wp.style.display=k==='workers'?'':'none';}
    });
    let rests=[], workers=[];
    const rf=el.querySelector('.wz-rest-field'), wf=el.querySelector('.wz-worker-field');
    function syncR(){ if(rf){rf.value=JSON.stringify(rests);route.engineData=route.engineData||{};route.engineData.serverless_rests=rf.value;} }
    function syncW(){ if(wf){wf.value=JSON.stringify(workers);route.engineData=route.engineData||{};route.engineData.serverless_workers=wf.value;} }
    function renderRests(){
        const l=el.querySelector('#wzRestList'); if(!l) return;
        l.innerHTML=rests.map((r,i)=>`
            <div class="wz-item-card" data-idx="${i}">
                <div class="wz-item-row">
                    <input type="text" class="wz-input wz-rest-name" placeholder="Name (e.g. stripe)" value="${_esc(r.name||'')}" style="flex:1;min-width:0;">
                    <select class="wz-select-inline wz-rest-method" style="width:80px;flex-shrink:0;">${['GET','POST','PUT','DELETE','PATCH'].map(m=>`<option${r.method===m?' selected':''}>${m}</option>`).join('')}</select>
                    <button type="button" class="btn small wz-rest-remove" style="color:var(--danger);border-color:rgba(255,59,48,0.4);flex-shrink:0;width:var(--btn-h-sm);padding:0;" title="Remove">✕</button>
                </div>
                <input type="text" class="wz-input wz-rest-url" placeholder="https://api.example.com/endpoint" value="${_esc(r.url||'')}" style="margin-top:5px;">
                <div style="margin-top:5px;">
                    <label class="wz-label" style="font-size:10px;margin-bottom:3px;">Headers (key: value — use env.VAR for secrets)</label>
                    <div class="wz-rest-headers-list" data-rest-idx="${i}" style="display:flex;flex-direction:column;gap:4px;"></div>
                    <button type="button" class="btn small wz-rest-add-header" data-rest-idx="${i}" style="margin-top:4px;font-size:10px;">+ Header</button>
                </div>
                <div class="wz-item-row" style="margin-top:5px;">
                    <div style="flex:1;"><label class="wz-label" style="font-size:10px;">Timeout</label><input type="text" class="wz-input wz-rest-timeout" placeholder="30s" value="${_esc(r.timeout||'')}"></div>
                </div>
                <div class="wz-hint" style="margin-top:3px;">Use <code>env.VAR</code> to inject secrets server-side — never exposed to the browser.</div>
            </div>`).join('')||'<div class="wz-hint" style="padding:6px 0;">No REST proxies yet.</div>';
        l.querySelectorAll('[data-idx]').forEach(row=>{const i=+row.dataset.idx;
            row.querySelector('.wz-rest-name')?.addEventListener('input',e=>{rests[i].name=e.target.value;syncR();});
            row.querySelector('.wz-rest-url')?.addEventListener('input',e=>{rests[i].url=e.target.value;syncR();});
            row.querySelector('.wz-rest-timeout')?.addEventListener('input',e=>{rests[i].timeout=e.target.value;syncR();});
            row.querySelector('.wz-rest-method')?.addEventListener('change',e=>{rests[i].method=e.target.value;syncR();});
            row.querySelector('.wz-rest-remove')?.addEventListener('click',()=>{rests.splice(i,1);renderRests();});
            if(!Array.isArray(rests[i].headers)) rests[i].headers=[];
            const hList=row.querySelector('.wz-rest-headers-list');
            function renderHeaders(ri){
                if(!hList) return;
                hList.innerHTML=rests[ri].headers.map((h,j)=>`
                    <div class="wz-item-row" data-hidx="${j}" style="gap:4px;">
                        <input type="text" class="wz-rh-key wz-input-sm" placeholder="Header name" value="${_esc(h.key||'')}" style="flex:1;">
                        <input type="text" class="wz-rh-val wz-input-sm" placeholder="Value or env.VAR" value="${_esc(h.value||'')}" style="flex:2;">
                        <button type="button" class="btn small wz-rh-rm" style="padding:2px 6px;color:var(--danger);border-color:var(--danger);">✕</button>
                    </div>`).join('');
                hList.querySelectorAll('[data-hidx]').forEach(hr=>{const j=+hr.dataset.hidx;
                    hr.querySelector('.wz-rh-key')?.addEventListener('input',ev=>{rests[ri].headers[j].key=ev.target.value;syncR();});
                    hr.querySelector('.wz-rh-val')?.addEventListener('input',ev=>{rests[ri].headers[j].value=ev.target.value;syncR();});
                    hr.querySelector('.wz-rh-rm')?.addEventListener('click',()=>{rests[ri].headers.splice(j,1);renderHeaders(ri);syncR();});
                });
            }
            renderHeaders(i);
            row.querySelector('.wz-rest-add-header')?.addEventListener('click',()=>{rests[i].headers.push({key:'',value:''});renderHeaders(i);syncR();});
        });
    }
    function renderWorkers(){
        const l=el.querySelector('#wzWorkerList'); if(!l) return;
        l.innerHTML=workers.map((wk,i)=>`
            <div class="wz-item-card" data-idx="${i}">
                <div class="wz-item-row">
                    <input type="text" class="wz-input wz-wk-name" placeholder="Name (e.g. pdf-renderer)" value="${_esc(wk.name||'')}" style="flex:1;min-width:0;">
                    <button type="button" class="btn small wz-wk-remove" style="color:var(--danger);border-color:rgba(255,59,48,0.4);flex-shrink:0;width:var(--btn-h-sm);padding:0;" title="Remove">✕</button>
                </div>
                <input type="text" class="wz-input wz-wk-command" placeholder="Command — e.g. node scripts/pdf.js or python3 worker.py" value="${_esc(wk.command||'')}" style="margin-top:5px;">
                <div class="wz-hint" style="margin-top:2px;">Space-separated. Agbero manages the process lifecycle.</div>
                <div class="wz-item-row" style="margin-top:8px;gap:16px;">
                    <label class="wz-check"><input type="checkbox" class="wz-wk-bg"${wk.background?' checked':''}> Background daemon</label>
                    <label class="wz-check"><input type="checkbox" class="wz-wk-once"${wk.run_once?' checked':''}> Run once at startup</label>
                </div>
                <div class="wz-item-row" style="margin-top:8px;gap:8px;">
                    <div style="flex:1;min-width:0;"><label class="wz-label">Schedule (cron)</label>
                        <input type="text" class="wz-input wz-wk-schedule" placeholder="0 2 * * *  or blank" value="${_esc(wk.schedule||'')}"></div>
                    <div style="width:110px;flex-shrink:0;"><label class="wz-label">Timeout</label>
                        <input type="text" class="wz-input wz-wk-timeout" placeholder="30s" value="${_esc(wk.timeout||'')}"></div>
                </div>
            </div>`).join('')||'<div class="wz-hint" style="padding:6px 0;">No workers yet.</div>';
        l.querySelectorAll('[data-idx]').forEach(row=>{const i=+row.dataset.idx;
            row.querySelector('.wz-wk-name')?.addEventListener('input',e=>{workers[i].name=e.target.value;syncW();});
            row.querySelector('.wz-wk-command')?.addEventListener('input',e=>{workers[i].command=e.target.value;syncW();});
            row.querySelector('.wz-wk-schedule')?.addEventListener('input',e=>{workers[i].schedule=e.target.value;syncW();});
            row.querySelector('.wz-wk-timeout')?.addEventListener('input',e=>{workers[i].timeout=e.target.value;syncW();});
            row.querySelector('.wz-wk-bg')?.addEventListener('change',e=>{workers[i].background=e.target.checked;syncW();});
            row.querySelector('.wz-wk-once')?.addEventListener('change',e=>{workers[i].run_once=e.target.checked;syncW();});
            row.querySelector('.wz-wk-remove')?.addEventListener('click',()=>{workers.splice(i,1);renderWorkers();});
        });
    }
    el.querySelector('#wzAddRestBtn')?.addEventListener('click',()=>{rests.push({name:'',method:'GET',url:'',auth_header:'',timeout:''});renderRests();});
    el.querySelector('#wzAddWorkerBtn')?.addEventListener('click',()=>{workers.push({name:'',command:'',background:false,run_once:false,schedule:'',timeout:''});renderWorkers();});
    renderRests(); renderWorkers();
}

// ── _collectRouteData ─────────────────────────────────────────────────────
function _collectRouteData(el, route) {
    el.querySelectorAll('[data-wz-route-field]').forEach(inp=>{
        const key=inp.dataset.wzRouteField; if(!key) return;
        const [sec,field]=key.split('.');
        if(!route[sec]) route[sec]={};
        if(inp.type==='checkbox') route[sec][field]=inp.checked;
        else if(inp.type==='radio'){ if(inp.checked) route[sec][field]=inp.value; }
        else route[sec][field]=inp.value;
    });
}

// ── _wireToggleCards ──────────────────────────────────────────────────────────
// Guard against flicker: checkbox click fires 'change'; we must not re-fire it
// from within the header click handler or we get double-toggle blocking.
function _wireToggleCards(container) {
    container.querySelectorAll('.wz-toggle-card input[type="checkbox"]').forEach(cb=>{
        const card=cb.closest('.wz-toggle-card'), header=card?.querySelector('.wz-toggle-header[data-target]'), bodyId=header?.dataset.target;
        const body=bodyId?(container.querySelector('#'+bodyId)??document.getElementById(bodyId)):null;
        if(!body) return;
        body.dataset.collapseManaged='1';

        // Use CSS show/hide instead of collapse.attach to avoid Oja collapse quirks
        function _open()  { body.style.display=''; body.style.opacity=''; body.style.pointerEvents=''; }
        function _close() { body.style.display='none'; body.style.opacity='0.45'; body.style.pointerEvents='none'; }

        // Initial state
        if(cb.checked) _open(); else _close();

        // Checkbox change — no animation, just toggle immediately
        cb.addEventListener('change', ()=>{ if(cb.checked) _open(); else _close(); });

        // Header click — toggle both panel AND checkbox atomically to avoid double-fire
        if(header) header.addEventListener('click',(e)=>{
            if(e.target.closest('.wz-switch')) return; // let the checkbox handle it
            e.stopPropagation();
            const nowOpen = body.style.display !== 'none';
            if(nowOpen) {
                _close(); cb.checked=false;
            } else {
                _open(); cb.checked=true;
            }
            // Fire change once, not twice
            cb.dispatchEvent(new Event('change',{bubbles:true}));
        });
    });
}

// ── Delegated wz-toggle — handled entirely by _wireToggleCards per-panel
// No global listener needed; would cause double-firing with collapseManaged panels.

// ════════════════════ STEP 3 — Review ════════════════════════════════════════
function _renderReviewStep(el) {
    const isAdvanced=_draft.host_type==='advanced';
    let previewObj={}, existing=_draft.raw_json||'';

    if(!isAdvanced) {
        try{ previewObj=buildHostConfig({..._draft,routes:_routes}); }catch(e){ previewObj={error:'Could not build config: '+e.message}; }
        existing=JSON.stringify(previewObj,null,2);
        saveDraft({..._draft,_routes,_step:3});
    }

    el.innerHTML=`
    ${isAdvanced?`<p class="wz-section-hint">Write the complete host config as JSON. It will be validated on save.</p>`
                :`<p style="font-size:13px;color:var(--text-mute);margin:0 0 12px;line-height:1.6;">Review your configuration before creating. You can edit the JSON directly.</p>`}
    <div style="display:flex;gap:8px;margin-bottom:8px;">
        <button id="wzFormatJsonBtn" class="btn small">✨ Format JSON</button>
    </div>
    <div id="submitErrorBox" class="submit-error-box"></div>
    <textarea id="wzReviewJson" class="json-editor" spellcheck="false"
              style="min-height:300px;width:100%;box-sizing:border-box;">${existing.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
        <button id="wzSubmitBtn" class="btn primary" style="min-width:140px;">Create Host</button>
    </div>`;

    const nb=query('#addHostNextBtn'); if(nb) nb.style.display='none';
    const nav=query('#addHostNav'); if(nav) nav.style.display='flex';
    // Wire prev button for review step (no _wireNav called here)
    if (_navAbort) _navAbort.abort();
    _navAbort = new AbortController();
    query('#addHostPrevBtn')?.addEventListener('click', () => {
        _step = isAdvanced ? 0 : 2; renderStep();
    }, { signal: _navAbort.signal });

    on('#wzFormatJsonBtn','click',()=>{
        const ta=query('#wzReviewJson');
        try{ ta.value=JSON.stringify(JSON.parse(ta.value),null,2); }
        catch(e){ notify.show('Invalid JSON: '+e.message,'error'); }
    });
    if(isAdvanced) query('#wzReviewJson').addEventListener('input',e=>{ _draft.raw_json=e.target.value; });

    on('#wzSubmitBtn','click',async(e,btn)=>{
        const errBox=query('#submitErrorBox');
        if(errBox){errBox.classList.remove('visible');errBox.textContent='';}
        btn.disabled=true; btn.textContent='Creating…';
        try{
            const raw=(query('#wzReviewJson')?.value||'').trim();
            const config=JSON.parse(raw||'{}');
            const domain=(_draft.domain||config.domains?.[0]||'').trim().toLowerCase();
            if(!domain) throw new Error('Domain is required');
            const result=await addHost(domain,config);
            if(result?.error) throw new Error(result.error);
            clearDraft();
            notify.show(domain+' created successfully','success');
            emit('hosts:refresh'); emit('config:reload');
            emit('app:navigate',{path:'/hosts'});
        }catch(err){
            btn.disabled=false; btn.textContent='Create Host';
            if(errBox){errBox.textContent=err.message||'Failed to create host — check your configuration';errBox.classList.add('visible');}
            saveDraft({..._draft,_routes,_step:3});
        }
    });
}

// ── Nav wiring ────────────────────────────────────────────────────────────────
// Use AbortController so each call REPLACES the previous handler instead of accumulating
let _navAbort = null;
function _wireNav(validate) {
    if (_navAbort) _navAbort.abort();
    _navAbort = new AbortController();
    const sig = _navAbort.signal;

    const nav=query('#addHostNav'), nb=query('#addHostNextBtn'), errEl=query('#addHostValidError');
    if(nav) nav.style.display='flex'; if(nb) nb.style.display='';

    nb?.addEventListener('click', () => {
        if(errEl) errEl.style.display='none';
        if(validate){ const e=validate(); if(e){if(errEl){errEl.textContent=e;errEl.style.display='block';} return;} }
        saveDraft({..._draft,_routes,_step});
        _step++; renderStep();
    }, { signal: sig });

    query('#addHostPrevBtn')?.addEventListener('click', () => {
        _step=Math.max(0,_step-1); renderStep();
    }, { signal: sig });
}

function _esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

component.onUnmount(()=>{});
</script>
