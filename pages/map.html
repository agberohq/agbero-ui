<div class="page full-width-page active" style="min-height: 70vh; display: flex; flex-direction: column;">
    <div class="graph-toolbar">
        <div class="graph-legend">
            <span class="legend-item"><span class="dot root"></span> Agbero</span>
            <span class="legend-item"><span class="dot host"></span> Host</span>
            <span class="legend-item"><span class="dot route"></span> Route</span>
            <span class="legend-item"><span class="dot backend"></span> Backend</span>
            <span class="legend-item"><span class="dot down"></span> Error/Dead</span>
        </div>
        <div class="graph-actions">
            <button class="btn small" id="mapPauseBtn">Resume Updates</button>
            <button class="btn small" id="resetZoomBtn">Reset View</button>
        </div>
    </div>

    <div style="display:flex; flex:1; overflow:hidden; min-height: 400px;">
        <div id="graphContainer" style="flex:1; overflow:hidden;"></div>
        <div id="mapInfoPanel" style="display:none; width:280px; border-left:1px solid var(--border); overflow-y:auto; padding:16px; background:var(--panel-bg); flex-shrink:0;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
                <strong id="mapInfoTitle" style="font-size:13px;"></strong>
                <button id="mapInfoClose" class="btn small">✕</button>
            </div>
            <div id="mapInfoBody" style="font-size:12px;"></div>
        </div>
    </div>
</div>

<script type="module">
    import { component, on, listen, emit } from '../lib/oja.full.esm.js';
    import { store }                        from '../js/store.js';
    import { fetchUptime, fetchConfig }     from '../js/api.js';

    // ── Lazy-load D3 + graph.js — only runs when this page is mounted ─────────
    // D3 is a genuine force-simulation dependency with no Oja equivalent.
    // Loading it here (not in index.html) means every other page avoids the ~250KB hit.
    async function loadGraphDeps() {
        if (window.RouteGraph) return; // already loaded
        await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'https://d3js.org/d3.v7.min.js';
            s.onload  = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
        });
        await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'js/graph.js';
            s.onload  = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
        });
    }

    let graph     = null;
    let paused    = true;
    let pollTimer = null;

    async function init() {
        await loadGraphDeps();

        graph = new RouteGraph('graphContainer');

        // Wire graph node clicks through Oja emit — no window.app dependency
        graph._onClick = function(d) {
            if (d.type === 'route' && d.meta) {
                emit('drawer:open-route', { host: d.meta.hostname, idx: d.meta.routeIdx, type: d.meta.routeType });
            } else if (d.type === 'backend' && d.meta) {
                emit('drawer:open-backend', { host: d.meta.hostname, routeIdx: d.meta.routeIdx, backendIdx: d.meta.backendIdx, type: d.meta.routeType });
            } else if (d.type === 'host' && d.meta) {
                emit('perf:open', { hostname: d.meta.hostname });
            }
        };

        graph.onNodeClick = function(node) {
            const panel   = query('#mapInfoPanel');
            const titleEl = query('#mapInfoTitle');
            const bodyEl  = query('#mapInfoBody');
            if (!panel || !titleEl || !bodyEl) return;
            titleEl.textContent = node.label || node.id || 'Node';
            bodyEl.innerHTML    = buildNodeInfo(node);
            panel.style.display = 'block';
        };

        await refresh();
    }

    function buildNodeInfo(node) {
        const rows = [];
        const add  = (label, val) => {
            if (val !== undefined && val !== null && val !== '')
                rows.push(`<div style="margin-bottom:8px;"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-mute);margin-bottom:2px;">${label}</div><div style="font-family:var(--font-mono,monospace);font-size:11px;color:var(--fg);word-break:break-all;">${val}</div></div>`);
        };

        add('Type',     node.type);
        add('ID',       node.id);
        add('Status',   node.alive === false ? '❌ Dead' : node.alive === true ? '✅ Alive' : '—');
        add('Protocol', node.protocol);
        add('Path',     node.path);
        add('Strategy', node.strategy);

        if (node.latency_us) {
            add('p50', node.latency_us.p50 ? (node.latency_us.p50 / 1000).toFixed(1) + 'ms' : null);
            add('p99', node.latency_us.p99 ? (node.latency_us.p99 / 1000).toFixed(1) + 'ms' : null);
            add('Reqs', node.latency_us.count);
        }
        if (node.health) {
            add('Health Score',  node.health.score);
            add('Health Status', node.health.status);
            if (node.health.consecutive_failures > 0) add('Consec. Fails', node.health.consecutive_failures);
        }
        if (node.type === 'host') {
            const hStat = (store.get('hostsData')?.stats?.[node.id]) || {};
            add('Total Reqs', hStat.total_reqs);
            rows.push(`<button class="btn small" onclick="window._emit?.('perf:open',{hostname:'${node.id}'})" style="margin-top:8px;">📈 Perf History</button>`);
        }
        return rows.join('') || '<div style="color:var(--text-mute);">No data</div>';
    }

    async function refresh() {
        if (!graph) return;
        // Use cached config when available — fetchConfig() only if we have nothing
        const config = store.get('lastConfig') || await fetchConfig();
        const uptime = await fetchUptime();
        if (!config || !uptime) return;
        graph.render(config, uptime.hosts || {});
    }

    // Expose emit globally so onclick in buildNodeInfo works without a module import
    window._emit = emit;

    // ── Boot ──────────────────────────────────────────────────────────────────
    init().catch(err => {
        const container = query('#graphContainer');
        if (container) container.innerHTML = `<div class="empty-state" style="margin-top:60px;">⚠️ Failed to load graph: ${err.message}</div>`;
    });

    const unsub = listen('metrics:updated', ({ hosts }) => {
        if (paused || !graph) return;
        const config = store.get('lastConfig');
        if (config) graph.render(config, hosts || {});
    });

    on('#mapPauseBtn', 'click', (e, el) => {
        paused = !paused;
        el.innerText = paused ? 'Resume Updates' : 'Pause Updates';
        if (!paused) refresh();
    });

    on('#resetZoomBtn',  'click', () => graph?.resetZoom());
    on('#mapInfoClose',  'click', () => { query('#mapInfoPanel').style.display = 'none'; });

    pollTimer = setInterval(() => { if (!paused) refresh(); }, 10_000);

    component.onUnmount(() => {
        unsub?.();
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = null;
    });
</script>
