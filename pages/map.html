<div class="page full-width-page active" style="min-height:70vh;display:flex;flex-direction:column;">
    <div class="graph-toolbar">
        <div class="graph-legend">
            <span class="legend-item"><span class="dot root"></span> Agbero</span>
            <span class="legend-item"><span class="dot host"></span> Host</span>
            <span class="legend-item"><span class="dot route"></span> HTTP</span>
            <span class="legend-item"><span class="dot" style="background:#5ac8fa;"></span> TCP</span>
            <span class="legend-item"><span class="dot" style="background:#ff9500;"></span> UDP</span>
            <span class="legend-item"><span class="dot" style="background:#af52de;"></span> Worker</span>
            <span class="legend-item"><span class="dot" style="background:#34c759;"></span> Replay</span>
            <span class="legend-item"><span class="dot backend"></span> Backend</span>
            <span class="legend-item"><span class="dot down"></span> Error/Dead</span>
        </div>
        <div class="graph-actions">
            <button class="btn small" id="mapPauseBtn">Resume Updates</button>
            <button class="btn small" id="resetZoomBtn">Reset View</button>
        </div>
    </div>

    <div style="display:flex;flex:1;overflow:hidden;min-height:400px;position:relative;">
        <!-- Loading overlay -->
        <div id="mapLoading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:5;">
            <div style="text-align:center;color:var(--text-mute);">
                <div class="loading-row" style="width:200px;height:4px;border-radius:2px;margin:0 auto 12px;"></div>
                <div style="font-size:12px;">Loading route graph…</div>
            </div>
        </div>
        <div id="graphContainer" style="flex:1;overflow:hidden;"></div>
        <div id="mapInfoPanel" style="display:none;width:280px;border-left:1px solid var(--border);overflow-y:auto;padding:16px;background:var(--panel-bg);flex-shrink:0;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                <strong id="mapInfoTitle" style="font-size:13px;"></strong>
                <button id="mapInfoClose" class="btn small">✕</button>
            </div>
            <div id="mapInfoBody" style="font-size:12px;"></div>
        </div>
    </div>
</div>
