<div class="page full-width-page active" style="min-height:70vh;display:flex;flex-direction:column;">
    <div class="graph-toolbar">
        <div class="graph-legend">
            <span class="legend-item"><span class="dot root"></span> Agbero</span>
            <span class="legend-item"><span class="dot host"></span> Host</span>
            <span class="legend-item"><span class="dot route"></span> HTTP</span>
            <span class="legend-item"><span class="dot" style="background:#5ac8fa;"></span> TCP</span>
            <span class="legend-item"><span class="dot" style="background:#ff9500;"></span> UDP</span>
            <span class="legend-item"><span class="dot" style="background:#af52de;"></span> Worker</span>
            <span class="legend-item"><span class="dot" style="background:#34c759;"></span> Replay</span>
            <span class="legend-item"><span class="dot backend"></span> Backend</span>
            <span class="legend-item"><span class="dot down"></span> Dead</span>
        </div>
        <div class="graph-actions">
            <div style="position:relative;">
                <input type="text" id="mapSearch" class="search-input"
                       placeholder="Search nodes…"
                       style="width:180px;height:var(--btn-h-sm);padding:0 26px 0 8px;font-size:12px;box-sizing:border-box;"
                       autocomplete="off" spellcheck="false">
                <button id="mapSearchClear" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-mute);font-size:12px;padding:0;line-height:1;display:none;">✕</button>
            </div>
            <button class="btn small" id="mapPauseBtn">▶ Resume</button>
            <button class="btn small" id="resetZoomBtn">⊙ Reset View</button>
        </div>
    </div>

    <div style="display:flex;flex:1;overflow:hidden;min-height:400px;position:relative;">
        <!-- Loading overlay -->
        <div id="mapLoading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:5;">
            <div style="text-align:center;color:var(--text-mute);">
                <div class="loading-row" style="width:200px;height:4px;border-radius:2px;margin:0 auto 12px;"></div>
                <div style="font-size:12px;">Loading route graph…</div>
            </div>
        </div>

        <div id="graphContainer" style="flex:1;overflow:hidden;"></div>

        <!-- Info panel -->
        <div id="mapInfoPanel" style="display:none;width:300px;border-left:1px solid var(--border);overflow-y:auto;background:var(--panel-bg);flex-shrink:0;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);">
                <div>
                    <div id="mapInfoTitle" style="font-size:13px;font-weight:500;"></div>
                    <div id="mapInfoSubtitle" style="font-size:11px;color:var(--text-mute);margin-top:2px;"></div>
                </div>
                <button id="mapInfoClose" class="btn small" style="padding:0;width:24px;height:24px;flex-shrink:0;">✕</button>
            </div>
            <div id="mapInfoBody" style="padding:14px 16px;font-size:12px;"></div>
            <div id="mapInfoActions" style="padding:0 16px 16px;display:flex;flex-direction:column;gap:6px;"></div>
        </div>
    </div>
</div>
