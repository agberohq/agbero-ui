<div class="page active">
    <div class="flex-right">
        <div style="position:relative;flex:1;max-width:340px;">
            <input type="text" id="hostSearch" class="search-input" placeholder="Search hosts, paths, or backends…" autocomplete="off" style="width:100%;padding-right:28px;">
            <button id="hostSearchClear" title="Clear search"
                    style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-mute);font-size:14px;padding:0;display:none;">✕</button>
        </div>
        <button class="btn primary" id="addHostBtn">+ Host</button>
        <button class="btn small" id="refreshHostsBtn" style="width:var(--btn-h);padding:0;">⟳</button>
    </div>
    <div id="hostsContainer"></div>
    <div id="hostsPager"></div>
</div>

<script type="module">
    import { component, on, emit, listen, modal, ui, clipboard, notify, query, queryAll, pagination, Search } from '../lib/oja.full.esm.js';
    import { store } from '../js/store.js';
    import { fetchUptime, fmtNum, addHost, addHostHCL, getHostHCL, deleteHost } from '../js/api.js';
    import { isOn } from '../js/utils.js';

    // ── Helpers ────────────────────────────────────────────────────────────────

    function healthDot(b, has) {
        if (!has) return { cls: 'warn', title: 'No data' };
        const s = b.health?.status || 'Unknown';
        if (!b.alive || s === 'Dead' || s === 'Unhealthy') return { cls: 'down', title: s !== 'Unknown' ? s : 'Dead' };
        if (s === 'Degraded') return { cls: 'warn', title: 'Degraded' };
        if (s === 'Healthy')  return { cls: 'ok',   title: 'Healthy' };
        return { cls: b.alive ? 'info' : 'down', title: b.alive ? 'Unverified' : 'Dead' };
    }

    // ── Row builders ───────────────────────────────────────────────────────────

    function backendRowHtml(b, cfgB, statBEs, bIdx) {
        const url      = b.url || b.address || cfgB.address || '';
        const w        = cfgB.weight !== undefined ? cfgB.weight : (b.weight || 1);
        const { cls, title } = healthDot(b, !!statBEs[bIdx]);
        const p99      = b.latency_us?.p99 ? (b.latency_us.p99 / 1000).toFixed(0) + 'ms' : null;
        const score    = b.health?.score ?? null;
        const reqs     = b.total_reqs || 0;
        const inflight = b.in_flight  > 0;

        const tags = [
            score !== null ? `<span class="be-tag" title="Health score">${score}</span>` : null,
            p99 ? `<span class="be-tag">p99 ${p99}</span>` : null,
            `<span class="be-tag">W:${w}</span>`,
            reqs ? `<span class="be-tag">${fmtNum(reqs)}</span>` : null,
        ].filter(Boolean).join('');

        return `
        <div class="backend-row ${cls === 'down' ? 'down' : ''}">
            <div class="be-left">
                <span class="dot ${cls}" title="${title}"></span>
                <span class="be-url copyable" data-action="copy-url" data-url="${url}">${url}</span>
                ${inflight ? `<span class="be-tag be-tag-warn">⚡ ${b.in_flight}</span>` : ''}
            </div>
            <div class="be-tags">${tags}</div>
        </div>`;
    }

    function routeBadges(r) {
        const t = [];
        if (r.web) {
            if (r.web.root) {
                // Show markdown view mode prominently — Browse vs Website are meaningfully different
                if (isOn(r.web.markdown?.enabled)) {
                    const isBrowse = r.web.markdown?.view === 'browse';
                    t.push(`<span class="badge info">${isBrowse ? '📖 BROWSE' : 'MD'}</span>`);
                } else {
                    t.push('<span class="badge">STATIC</span>');
                }
            }
            if (r.web.listing)             t.push('<span class="badge">LISTING</span>');
            if (isOn(r.web.git?.enabled))  t.push('<span class="badge info">GIT</span>');
            if (isOn(r.web.php?.enabled))  t.push('<span class="badge" style="background:#6a73a6;color:#fff;border-color:#6a73a6;">PHP</span>');
        }
        if (r.serverless && isOn(r.serverless.enabled)) {
            const wc = (r.serverless.workers || []).length;
            const rc = (r.serverless.rests   || []).length;
            if (wc) t.push(`<span class="badge warn">WORKER (${wc})</span>`);
            if (rc) t.push(`<span class="badge info">REST (${rc})</span>`);
        }
        // Proxy badges — always show something when backends are configured
        const beServers = r.backends?.servers || [];
        if (isOn(r.backends?.enabled) && beServers.length > 0) {
            if (beServers.length === 1) {
                t.push('<span class="badge info">PROXY</span>');
            } else {
                const strategy  = r.backends.strategy || 'round_robin';
                const stratLabel = strategy.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                t.push(`<span class="badge info">LB: ${stratLabel} (${beServers.length})</span>`);
            }
        }
        if (isOn(r.cache?.enabled))               t.push('<span class="badge success">CACHE</span>');
        if (isOn(r.wasm?.enabled))                t.push('<span class="badge transform">WASM</span>');
        if (isOn(r.rate_limit?.enabled))          t.push('<span class="badge traffic">RATE LIMIT</span>');
        if (isOn(r.cors?.enabled))                t.push('<span class="badge">CORS</span>');
        if (isOn(r.compression_config?.enabled))  t.push('<span class="badge">GZIP</span>');
        if (isOn(r.firewall?.status))             t.push('<span class="badge danger">FIREWALL</span>');
        if (r.allowed_ips?.length)                t.push('<span class="badge warn">IP FILTER</span>');
        if (isOn(r.fallback?.enabled))            t.push('<span class="badge">FALLBACK</span>');
        if (r.rewrites?.length)                   t.push(`<span class="badge">REWRITE (${r.rewrites.length})</span>`);
        if (r.strip_prefixes?.length)             t.push(`<span class="badge">STRIP (${r.strip_prefixes.length})</span>`);
        if (r.env && Object.keys(r.env).length)   t.push('<span class="badge">ENV</span>');
        // Auth badges — check all four methods (all Enabled type)
        const auths = [];
        if (isOn(r.basic_auth?.enabled))   auths.push('BASIC');
        if (isOn(r.jwt_auth?.enabled))     auths.push('JWT');
        if (isOn(r.forward_auth?.enabled)) auths.push('FWD');
        if (isOn(r.oauth?.enabled))        auths.push('OAUTH');
        if (auths.length) t.push(`<span class="badge sec">🔒 ${auths.join(', ')}</span>`);
        return t.length ? `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-left:10px;">${t.join('')}</div>` : '';
    }

    function hostCardHtml(hostname, hStats, cfgHost, term, certificates) {
        const cfgRoutes  = cfgHost.routes || [];
        // protected is Enabled type — check with isOn
        const isProtected = isOn(cfgHost.protected);

        // TLS badge
        const tlsMode = cfgHost.tls?.mode || 'auto';
        let tlsText = 'Auto TLS', tlsClass = 'success', tlsTitle = 'Managed by Agbero';
        if (tlsMode === 'none')             { tlsClass = 'error';   tlsText = 'No TLS'; }
        else if (tlsMode.includes('local')) { tlsClass = 'warning'; tlsText = 'Local TLS'; }
        const cert = certificates.find(c => c.host === hostname);
        if (cert?.daysLeft !== undefined) {
            tlsTitle = `Expires: ${new Date(cert.expiry).toLocaleDateString()} (${cert.daysLeft}d)`;
            if (cert.daysLeft < 7) {
                tlsClass = cert.daysLeft < 0 ? 'error' : 'warning';
                tlsText  = cert.daysLeft < 0 ? 'Expired' : `${cert.daysLeft}d`;
            }
        }

        const deleteBtn = isProtected
            ? `<button class="btn small" disabled title="Cannot delete — protected host"
                       style="opacity:0.4;cursor:not-allowed;">Delete</button>`
            : `<button class="btn small" data-action="delete-host" data-hostname="${hostname}"
                       style="color:var(--danger);border-color:var(--danger);">Delete</button>`;

        const editBtn = isProtected
            ? ''
            : `<button class="btn small" data-action="edit-hcl" data-hostname="${hostname}">Edit HCL</button>`;

        // Routes
        const statRoutes = hStats.routes || [];
        const maxRoutes  = Math.max(cfgRoutes.length, statRoutes.length);
        let routesHtml   = '';

        for (let idx = 0; idx < maxRoutes; idx++) {
            const cfgRoute  = cfgRoutes[idx]  || {};
            const statRoute = statRoutes[idx] || {};
            const path      = cfgRoute.path || statRoute.path || '/';
            const proto     = (cfgRoute.protocol || statRoute.protocol || 'http').toUpperCase();
            const protoClass= proto === 'HTTP' ? 'success' : 'info';

            const configBEs  = cfgRoute.backends?.servers || [];
            const statBEs    = statRoute.backends || [];
            const displayBEs = statBEs.length ? statBEs : configBEs;
            const backendsHtml = displayBEs.length
                ? `<div class="backend-list">${displayBEs.map((b, i) => backendRowHtml(b, configBEs[i] || {}, statBEs, i)).join('')}</div>`
                : '';

            routesHtml += `
            <div class="route-block clickable" data-action="open-route"
                 data-host="${hostname}" data-idx="${idx}" data-type="route">
                <div class="route-header">
                    <span class="badge ${protoClass}">${proto}</span>
                    <span class="route-path">${path}</span>
                    ${routeBadges(cfgRoute)}
                </div>
                ${backendsHtml}
            </div>`;
        }

        // TCP proxies
        (hStats.proxies || []).forEach((proxy, idx) => {
            routesHtml += `
            <div class="route-block clickable" data-action="open-route"
                 data-host="${hostname}" data-idx="${idx}" data-type="proxy">
                <div class="route-header">
                    <span class="badge info">TCP</span>
                    <span class="route-path">${proxy.name || proxy.path || '*'}</span>
                </div>
            </div>`;
        });

        // Host-level metadata row (compression, limits)
        const hostMeta = [];
        if (cfgHost.compression)                hostMeta.push('<span class="badge">GZIP</span>');
        if (cfgHost.limits?.max_body_size)       hostMeta.push(`<span class="badge">${(cfgHost.limits.max_body_size / 1024 / 1024).toFixed(0)}MB limit</span>`);
        if (cfgHost.bind?.length)                hostMeta.push(`<span class="badge">:${cfgHost.bind.join(', :')}</span>`);

        return `
        <div class="host-row" data-hostname="${hostname}">
            <div class="host-header" data-hostname="${hostname}">
                <div>
                    <div class="host-name" style="cursor:pointer;" data-action="open-host-route" data-hostname="${hostname}">
                        ${hostname}
                        <span class="badge ${tlsClass}" title="${tlsTitle}">${tlsText}</span>
                        ${isProtected ? '<span class="badge" style="background:var(--hover-bg);color:var(--text-mute);border:1px solid var(--border);" title="Protected — managed by server">🔒</span>' : ''}
                        ${hStats.total_reqs ? `<span class="badge" style="background:var(--hover-bg);color:var(--text-mute);border:1px solid var(--border);">${fmtNum(hStats.total_reqs)} reqs</span>` : ''}
                        ${hostMeta.join('')}
                    </div>
                    ${cfgHost.domains?.length > 1 ? `<div class="host-meta">${cfgHost.domains.join(', ')}</div>` : ''}
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div class="host-sparkline" id="spark-${hostname}"
                         data-action="open-perf" data-hostname="${hostname}"
                         title="Requests/sec — click for performance details"
                         style="display:none;"></div>
                    <span class="host-perf-hint" id="spark-hint-${hostname}"
                          data-action="open-perf" data-hostname="${hostname}">Performance &nearr;</span>
                    ${editBtn}
                    ${deleteBtn}
                </div>
            </div>
            ${routesHtml}
        </div>`;
    }

    // ── Pagination ─────────────────────────────────────────────────────────────
    const savedPageSize = store.get('hosts.pageSize') || 20;
    const pg = pagination({
        pageSize: savedPageSize,
        pageSizes: [10, 20, 50, 100],
        onPageChange: (p, size) => { store.set('hosts.pageSize', size); renderPage(); },
    });
    let stopPager = null;

    // ── Search index ───────────────────────────────────────────────────────────
    let _searchIndex = null;

    function _buildSearchIndex() {
        const hostsStats  = (store.get('hostsData') || {}).stats || {};
        const configHosts = (store.get('lastConfig') || {}).hosts || {};
        const docs = Object.entries(hostsStats).map(([hostname, hStats]) => {
            const cfg      = configHosts[hostname] || {};
            const domains  = (cfg.domains || [hostname]).join(' ');
            const backends = (hStats.routes || []).flatMap(r => (r.backends || []).map(b => b.url || b.address || '')).join(' ');
            const paths    = (hStats.routes || []).map(r => r.path || '/').join(' ');
            return { id: hostname, hostname, domains, backends, paths };
        });
        _searchIndex = new Search(docs, { fields: ['hostname','domains','backends','paths'], weights: { hostname:3,domains:2,backends:1,paths:1 }, fuzzy: true });
    }

    function filteredEntries() {
        const hostsStats = (store.get('hostsData') || {}).stats || {};
        const term       = (store.get('searchTerm') || '').trim();
        if (!term) return Object.entries(hostsStats);
        if (!_searchIndex) _buildSearchIndex();
        return _searchIndex.search(term).map(r => [r.doc.hostname, hostsStats[r.doc.hostname]]).filter(([,v]) => v !== undefined);
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function renderPage() {
        const configHosts  = (store.get('lastConfig') || {}).hosts || {};
        const certificates = store.get('certificates') || [];
        const containerEl  = query('#hostsContainer');
        if (!containerEl) return;

        const hostsStats = (store.get('hostsData') || {}).stats || {};
        if (!Object.keys(hostsStats).length) {
            containerEl.innerHTML = `<div class="empty-state"><span>🔮 No hosts configured</span><span>Add a host in agbero.hcl and restart</span></div>`;
            pg.updateTotal(0);
            return;
        }

        const all = filteredEntries();
        const term = (store.get('searchTerm') || '').toLowerCase();
        if (!all.length) {
            containerEl.innerHTML = `<div class="empty-state"><span>🔍 No hosts matching "${term}"</span></div>`;
            pg.updateTotal(0);
            return;
        }

        pg.updateTotal(all.length);
        const pageSlice = pg.slice(all);

        containerEl.innerHTML = pageSlice
            .map(([hostname, hStats]) => hostCardHtml(hostname, hStats, configHosts[hostname] || {}, term, certificates))
            .join('');

        // Draw sparklines after DOM is ready
        pageSlice.forEach(([hostname]) => {
            const el     = query('#spark-' + hostname);
            const hintEl = query('#spark-hint-' + hostname);
            if (!el) return;
            const spark   = store.get('sparklines.' + hostname);
            const hasData = spark?.rps?.length >= 3;
            if (hintEl) hintEl.style.display = hasData ? 'none' : '';
            el.style.display = hasData ? '' : 'none';
            if (!hasData) return;

            const vals = spark.rps;
            const W = 84, H = 28, P = 3, iW = W-P*2, iH = H-P*2;
            const max = Math.max(...vals, 0.001), n = vals.length;
            const xS = i => (P + (i/Math.max(n-1,1))*iW).toFixed(1);
            const yS = v => (P + iH - (v/max)*iH).toFixed(1);
            const pts  = vals.map((v,i) => `${xS(i)},${yS(v)}`).join(' ');
            const fX = xS(0), lX = xS(n-1), bY = (P+iH).toFixed(1);
            const area = `M${fX},${bY} ${vals.map((v,i) => `L${xS(i)},${yS(v)}`).join(' ')} L${lX},${bY} Z`;
            const color = vals.some(v => v > 0) ? 'var(--accent)' : 'var(--text-mute)';
            const gid   = 'sk_' + hostname.replace(/[^a-z0-9]/gi,'_');
            el.innerHTML = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible;">
                <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
                    <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
                </linearGradient></defs>
                <path d="${area}" fill="url(#${gid})"/>
                <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
                <circle cx="${xS(n-1)}" cy="${yS(vals[n-1])}" r="2.5" fill="${color}" stroke="var(--bg)" stroke-width="1.5"/>
            </svg>`;
        });
    }

    function syncList() { _searchIndex = null; pg.reset(); renderPage(); }

    async function refresh() {
        const btn = query('#refreshHostsBtn');
        if (btn) ui.btn.loading(btn, '…');
        const data = await fetchUptime();
        if (btn) ui.btn.reset(btn);
        if (!data) return;
        store.set('hostsData', { stats: data.hosts || {} });
        syncList();
    }

    // ── Boot ───────────────────────────────────────────────────────────────────
    const savedTerm = store.get('searchTerm') || '';
    const searchInput = query('#hostSearch');
    if (searchInput && savedTerm) searchInput.value = savedTerm;

    if (!store.get('hostsData')) {
        query('#hostsContainer').innerHTML = `<div class="loading-rows"><div class="loading-row"></div><div class="loading-row"></div><div class="loading-row"></div></div>`;
    } else {
        syncList();
    }
    const pagerEl = query('#hostsPager');
    if (pagerEl) stopPager = pg.mount(pagerEl);

    // ── Events ─────────────────────────────────────────────────────────────────
    let searchTimeout;
    on('#hostSearch', 'input', (e, el) => {
        clearTimeout(searchTimeout);
        const clearBtn = query('#hostSearchClear');
        if (clearBtn) clearBtn.style.display = el.value ? '' : 'none';
        searchTimeout = setTimeout(() => { store.set('searchTerm', el.value.trim()); syncList(); }, 150);
    });

    on('#hostSearchClear', 'click', () => {
        const inp = query('#hostSearch');
        if (inp) { inp.value = ''; inp.focus(); }
        query('#hostSearchClear').style.display = 'none';
        store.set('searchTerm', '');
        syncList();
    });

    if (savedTerm && query('#hostSearchClear')) query('#hostSearchClear').style.display = '';

    on('#addHostBtn',      'click', () => emit('host:open-add-wizard'));
    on('#refreshHostsBtn', 'click', refresh);

    on('[data-action="open-route"]', 'click', (e, btn) => {
        emit('drawer:open-route', { host: btn.dataset.host, idx: parseInt(btn.dataset.idx), type: btn.dataset.type });
    });

    on('[data-action="open-host-route"]', 'click', (e, el) => {
        e.stopPropagation();
        emit('drawer:open-route', { host: el.dataset.hostname, idx: 0, type: 'route' });
    });

    on('[data-action="edit-hcl"]', 'click', async (e, btn) => {
        e.stopPropagation();
        const hostname = btn.dataset.hostname;
        ui.btn.loading(btn, '…');
        const hcl = await getHostHCL(hostname);
        ui.btn.reset(btn);
        if (!hcl) { notify.show('Could not load HCL — try again', 'error'); return; }
        emit('host:open-edit-hcl', { domain: hostname, hcl });
    });

    on('[data-action="open-perf"]', 'click', (e, el) => {
        if (e.target.closest('.btn')) return;
        emit('perf:open', { hostname: el.dataset.hostname });
    });

    on('[data-action="copy-url"]', 'click', (e, btn) => {
        e.stopPropagation();
        clipboard.write(btn.dataset.url).then(() => notify.show('Copied', 'success')).catch(() => {});
    });

    on('[data-action="delete-host"]', 'click', (e, btn) => {
        e.stopPropagation();
        const h = btn.dataset.hostname;
        emit('app:strict-delete', {
            message:    `Permanently delete configuration for <strong>${h}</strong>. This drops all traffic immediately.`,
            targetText: h,
            onConfirm:  async () => { await deleteHost(h); notify.show(`${h} deleted`, 'success'); refresh(); },
        });
    });

    const unsubSearch  = listen('hosts:search',   ({ term }) => { const el = query('#hostSearch'); if (el) el.value = term; store.set('searchTerm', term); syncList(); });
    const unsubEdit    = listen('host:open-edit',  ({ domain }) => {
        const config = store.get('lastConfig')?.hosts?.[domain];
        if (!config) return;
        query('#editHostTitle').innerText          = domain;
        query('#editHostError').style.display      = 'none';
        query('#editHostJsonTextarea').value       = JSON.stringify(config, null, 4);
        query('#saveHostJsonBtn').dataset.hostname = domain;
        modal.open('editHostJsonModal');
    });
    const unsubRefresh = listen('hosts:refresh', refresh);
    const unsubMetrics = listen('metrics:updated', renderPage);

    if (!store.get('hostsData')) refresh();

    component.onUnmount(() => {
        unsubSearch(); unsubEdit(); unsubRefresh(); unsubMetrics();
        stopPager?.(); stopPager = null;
    });
</script>
