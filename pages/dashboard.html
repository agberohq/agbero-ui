<div class="page active">

    <!-- Welcome bar -->
    <div class="welcome-bar" style="margin-bottom:24px;">
        <div class="welcome-brand">Welcome, <span id="welcomeName">ADMIN</span></div>
        <div class="welcome-meta" id="welcomeMeta">—</div>
    </div>

    <!-- Ops briefing: certs · top hosts · error hotspots · git deploys -->
    <div class="briefing-grid">

        <div class="brief-panel">
            <div class="brief-panel-header">
                <span class="brief-panel-title">TLS Certificates</span>
                <span id="certSummary" style="font-size:10px;color:var(--text-mute);font-family:var(--font-mono);"></span>
            </div>
            <div class="brief-panel-body" id="certBriefing">
                <div class="brief-empty">No certificate data yet</div>
            </div>
        </div>

        <div class="brief-panel">
            <div class="brief-panel-header">
                <span class="brief-panel-title">Top Hosts by Traffic</span>
                <span id="hostBriefSub" style="font-size:10px;color:var(--text-mute);font-family:var(--font-mono);"></span>
            </div>
            <div class="brief-panel-body" id="hostBriefing">
                <div class="brief-empty">Waiting for traffic data</div>
            </div>
        </div>

        <div class="brief-panel">
            <div class="brief-panel-header">
                <span class="brief-panel-title">Error Hotspots</span>
                <span id="errorBriefSub" style="font-size:10px;color:var(--text-mute);font-family:var(--font-mono);"></span>
            </div>
            <div class="brief-panel-body" id="errorBriefing">
                <div class="brief-empty">No errors recorded</div>
            </div>
        </div>

        <div class="brief-panel">
            <div class="brief-panel-header">
                <span class="brief-panel-title">Git Deploys</span>
                <span id="gitBriefSub" style="font-size:10px;color:var(--text-mute);font-family:var(--font-mono);"></span>
            </div>
            <div class="brief-panel-body" id="gitBriefing">
                <div class="brief-empty">No git deploys configured</div>
            </div>
        </div>

    </div>

    <!-- Health bar — click to expand -->
    <div class="health-section" id="healthSection">
        <div class="health-bar-row" id="healthBarRow" title="Click to expand">
            <div class="health-bar" id="globalHealthBar">
                <div class="hb-seg hb-ok"  style="width:100%"></div>
                <div class="hb-seg hb-err" style="width:0%"></div>
            </div>
            <div class="health-bar-summary">
                <span id="errorRateText" class="health-bar-stat">0.0% errors</span>
                <span id="latencyHttpText" class="health-bar-stat"></span>
                <span id="latencyTcpText"  class="health-bar-stat"></span>
                <span id="lastUpdatedText" class="health-bar-updated">—</span>
                <span class="health-bar-expand-icon">›</span>
            </div>
        </div>
        <div class="health-detail" id="healthDetail" style="display:none;">
            <div class="health-detail-grid" id="healthDetailGrid"></div>
        </div>
    </div>

    <!-- Response time chart -->
    <div class="chart-wrapper">
        <div class="chart-controls">
            <span class="chart-tab active" data-type="all">ALL</span>
            <span class="chart-tab" data-type="http">HTTP</span>
            <span class="chart-tab" data-type="tcp">TCP</span>
            <span class="chart-tab" data-type="udp">UDP</span>
        </div>
        <div id="responseGraph" style="width:100%;height:100%;"></div>
    </div>

    <!-- Notifications -->
    <div class="notif-panel" id="notifPanel">
        <div class="notif-panel-header">
            <span class="notif-panel-title">🔔 Alerts</span>
            <span id="notifCount" class="notif-count" style="display:none;"></span>
        </div>
        <div id="notifList" class="notif-list">
            <div class="notif-empty">No alerts — everything looks healthy</div>
        </div>
    </div>
</div>
