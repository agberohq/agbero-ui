<div class="page active">
    <!-- Global firewall status bar (Phase 7 #47) -->
    <div id="fwStatusBar" style="display:none;margin-bottom:16px;padding:10px 14px;background:var(--panel-bg);border:1px solid var(--border);border-radius:8px;">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.4px;">Mode</span>
                <span id="fwMode" class="badge">—</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.4px;">Inspect Body</span>
                <span id="fwInspectBody" class="badge">—</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.4px;">Default Dynamic</span>
                <span id="fwDefaultDynamic" class="badge">—</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.4px;">Default Static</span>
                <span id="fwDefaultStatic" class="badge">—</span>
            </div>
        </div>
    </div>

    <div class="flex-right" style="align-items:center;">
        <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;color:var(--text-mute);">Blocked IPs:</span>
            <span id="fwCount" class="badge" style="font-family:var(--font-mono);">—</span>
        </div>
        <div style="flex:1;"></div>
        <select id="fwSortSel" style="height:var(--btn-h-sm);padding:0 8px;border:1px solid var(--border);border-radius:6px;background:var(--panel-bg);color:var(--text-main);font-size:12px;font-family:var(--font-sans);margin-bottom:0;outline:none;cursor:pointer;">
            <option value="created_desc">Newest first</option>
            <option value="created_asc">Oldest first</option>
            <option value="ip">IP address</option>
        </select>
        <button class="btn primary" id="addRuleBtn">Block IP</button>
    </div>

    <div class="table-responsive">
        <table class="simple-table">
            <thead>
            <tr>
                <th>IP / CIDR</th>
                <th>REASON</th>
                <th class="hide-mobile">SCOPE</th>
                <th class="hide-mobile">CREATED</th>
                <th style="width:130px;">ACTION</th>
            </tr>
            </thead>
            <tbody id="firewallTable"></tbody>
        </table>
    </div>
</div>
