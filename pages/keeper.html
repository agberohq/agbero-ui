<div class="page active">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <div>
            <h2 style="margin:0;font-size:17px;font-weight:400;">Keeper</h2>
            <p style="margin:3px 0 0;font-size:12px;color:var(--text-mute);">Encrypted secret store. Reference secrets in config as <code>ss://key-name</code></p>
        </div>
        <div style="display:flex;gap:8px;" id="keeperActions">
            <button class="btn small" id="keeperLockBtn" style="display:none;color:var(--danger);border-color:var(--danger);">🔒 Lock</button>
            <button class="btn primary small" id="keeperAddBtn" style="display:none;">+ Secret</button>
        </div>
    </div>

    <!-- Locked state -->
    <div id="keeperLockedPanel">
        <div style="max-width:360px;margin:80px auto;text-align:center;">
            <div style="font-size:44px;margin-bottom:14px;line-height:1;">🔐</div>
            <p style="color:var(--text-mute);font-size:13px;margin:0 0 20px;line-height:1.6;">Enter your passphrase to unlock the secret store.</p>
            <div style="display:flex;gap:8px;align-items:stretch;">
                <input type="password" id="keeperPassphrase" class="search-input"
                       placeholder="Passphrase" style="flex:1;"
                       autocomplete="current-password">
                <button class="btn primary" id="keeperUnlockBtn">Unlock</button>
            </div>
            <div id="keeperUnlockError" style="color:var(--danger);font-size:11px;margin-top:8px;display:none;text-align:left;"></div>
        </div>
    </div>

    <!-- Unlocked state -->
    <div id="keeperUnlockedPanel" style="display:none;">

        <!-- Add secret inline form -->
        <div id="keeperAddForm" style="display:none;background:var(--panel-bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;">
            <div style="font-size:13px;font-weight:500;margin-bottom:12px;">New Secret</div>
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-bottom:8px;">
                <input type="text" id="keeperNewKey" class="search-input"
                       placeholder="key-name" autocomplete="off" spellcheck="false">
                <input type="text" id="keeperNewValue" class="search-input"
                       placeholder="value, env.VAR, or b64.…" autocomplete="off">
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:11px;color:var(--text-mute);">Use <code>env.VAR</code> for environment variables or <code>b64.XXX</code> for base64-encoded values.</span>
                <div style="display:flex;gap:6px;">
                    <button class="btn small" id="keeperCancelAddBtn">Cancel</button>
                    <button class="btn primary small" id="keeperSaveBtn">Save Secret</button>
                </div>
            </div>
            <div id="keeperAddError" style="color:var(--danger);font-size:11px;margin-top:6px;display:none;"></div>
        </div>

        <!-- Keys list -->
        <div id="keeperList">
            <div class="loading-rows"><div class="loading-row"></div><div class="loading-row"></div></div>
        </div>
    </div>
</div>

<script type="module">
    import { component, on, ui, notify, query } from '../lib/oja.full.esm.js';
    import { keeperUnlock, keeperLock, keeperList, keeperGet, keeperSet, keeperDelete } from '../js/api.js';

    let _unlocked = false;
    // Per-key reveal state: key → { timerId }
    const _revealed = new Map();

    // ── SVG icon constants ────────────────────────────────────────────────────
    const _svgCopy    = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
    const _eyeOpen    = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const _eyeClosed  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    function showLocked() {
        _unlocked = false;
        query('#keeperLockedPanel').style.display   = '';
        query('#keeperUnlockedPanel').style.display = 'none';
        query('#keeperLockBtn').style.display       = 'none';
        query('#keeperAddBtn').style.display        = 'none';
        query('#keeperPassphrase').value            = '';
        query('#keeperAddForm').style.display       = 'none';
    }

    function showUnlocked() {
        _unlocked = true;
        query('#keeperLockedPanel').style.display   = 'none';
        query('#keeperUnlockedPanel').style.display = '';
        query('#keeperLockBtn').style.display       = '';
        query('#keeperAddBtn').style.display        = '';
        loadKeys();
    }

    function renderKeys(keys) {
        const el = query('#keeperList');
        if (!el) return;

        if (!keys?.length) {
            el.innerHTML = `<div class="empty-state">
                <span>🗝️ No secrets yet</span>
                <span>Click <strong>+ Secret</strong> to add your first entry</span>
            </div>`;
            return;
        }

        el.innerHTML = `<div class="host-row" style="overflow:visible;">
            <table style="width:100%;border-collapse:collapse;">
                <thead>
                    <tr style="border-bottom:1px solid var(--border);">
                        <th style="text-align:left;padding:9px 16px;font-size:11px;color:var(--text-mute);font-weight:500;text-transform:uppercase;letter-spacing:.5px;width:25%;">Key</th>
                        <th style="text-align:left;padding:9px 16px;font-size:11px;color:var(--text-mute);font-weight:500;text-transform:uppercase;letter-spacing:.5px;width:25%;">Reference</th>
                        <th style="text-align:left;padding:9px 16px;font-size:11px;color:var(--text-mute);font-weight:500;text-transform:uppercase;letter-spacing:.5px;">Value</th>
                        <th style="width:76px;padding:9px 16px;"></th>
                    </tr>
                </thead>
                <tbody>
                    ${keys.map(k => `
                    <tr style="border-bottom:1px solid var(--border);vertical-align:top;" data-key="${k}">
                        <td style="padding:12px 16px;font-family:var(--font-mono);font-size:12px;color:var(--fg);word-break:break-all;">${k}</td>
                        <td style="padding:12px 16px;">
                            <div style="display:flex;align-items:center;gap:5px;">
                                <code style="font-size:11px;background:var(--hover-bg);padding:3px 7px;border-radius:3px;border:1px solid var(--border);color:var(--accent);white-space:nowrap;">ss://${k}</code>
                                <button class="keeper-icon-btn" data-action="copy-ref" data-ref="ss://${k}" title="Copy ss:// reference">
                                    ${_svgCopy}
                                </button>
                            </div>
                        </td>
                        <td style="padding:12px 16px;">
                            <!-- Hidden until revealed. Textarea so long values (JWT etc.) are scrollable + selectable -->
                            <div class="keeper-value-wrap" data-key="${k}" style="display:none;">
                                <textarea class="keeper-value" data-key="${k}" readonly
                                    style="width:100%;min-height:38px;max-height:120px;resize:vertical;
                                           font-family:var(--font-mono);font-size:11px;color:var(--text-main);
                                           background:var(--panel-bg);border:1px solid var(--border);border-radius:4px;
                                           padding:6px 8px;line-height:1.5;overflow-y:auto;word-break:break-all;
                                           white-space:pre-wrap;cursor:text;outline:none;margin:0;"></textarea>
                                <div style="margin-top:4px;text-align:right;">
                                    <button class="keeper-icon-btn keeper-copy-value-btn" data-action="copy-value" data-key="${k}" title="Copy value">
                                        ${_svgCopy}
                                    </button>
                                </div>
                            </div>
                        </td>
                        <td style="padding:12px 16px;text-align:right;">
                            <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;">
                                <button class="btn small keeper-reveal-btn" data-action="reveal-secret" data-key="${k}" title="Reveal value" style="padding:0;width:var(--btn-h-sm);justify-content:center;">
                                    ${_eyeOpen}
                                </button>
                                <button class="btn small" data-action="delete-key" data-key="${k}"
                                        style="color:var(--danger);border-color:rgba(255,59,48,0.4);">
                                    Delete
                                </button>
                            </div>
                        </td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    }

    async function loadKeys() {
        const el = query('#keeperList');
        if (el) el.innerHTML = '<div class="loading-rows"><div class="loading-row"></div><div class="loading-row"></div></div>';
        const data = await keeperList();
        if (data?.keys !== undefined) renderKeys(data.keys);
        else showLocked();
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    (async () => {
        const data = await keeperList();
        if (data?.keys !== undefined) showUnlocked();
        else showLocked();
    })();

    // ── Unlock ────────────────────────────────────────────────────────────────
    async function doUnlock() {
        const pass  = query('#keeperPassphrase').value.trim();
        const errEl = query('#keeperUnlockError');
        const btn   = query('#keeperUnlockBtn');
        if (!pass) return;
        errEl.style.display = 'none';
        ui.btn.loading(btn, 'Unlocking…');
        const res = await keeperUnlock(pass);
        ui.btn.reset(btn);
        if (res?.status === 'unlocked') showUnlocked();
        else { errEl.textContent = res?.error || 'Invalid passphrase'; errEl.style.display = 'block'; }
    }

    on('#keeperUnlockBtn',  'click',   doUnlock);
    on('#keeperPassphrase', 'keydown', (e) => { if (e.key === 'Enter') doUnlock(); });

    // ── Lock ──────────────────────────────────────────────────────────────────
    on('#keeperLockBtn', 'click', async (e, btn) => {
        ui.btn.loading(btn, 'Locking…');
        await keeperLock();
        ui.btn.reset(btn);
        _revealed.clear();
        showLocked();
        notify.show('Keeper locked', 'success');
    });

    // ── Reveal secret value — fetches live from API, auto-obscures after 30s ──
    on('[data-action="reveal-secret"]', 'click', async (e, btn) => {
        e.stopPropagation();
        const key     = btn.dataset.key;
        const wrap    = query(`.keeper-value-wrap[data-key="${key}"]`);
        const ta      = query(`.keeper-value[data-key="${key}"]`);
        if (!wrap || !ta) return;

        // If already revealed, hide it
        if (_revealed.has(key)) {
            const { timerId } = _revealed.get(key);
            clearTimeout(timerId);
            _revealed.delete(key);
            wrap.style.display = 'none';
            ta.value = '';
            btn.innerHTML = _eyeOpen;
            btn.title = 'Reveal value';
            return;
        }

        btn.disabled = true;
        const res = await keeperGet(key);
        btn.disabled = false;

        if (!res?.value) {
            notify.show('Could not fetch secret value', 'error');
            return;
        }

        // Show in textarea — long values (JWT, PEM) are scrollable and selectable
        ta.value = res.value;
        // Auto-size rows based on content length
        const lines = res.value.split('\n').length;
        ta.rows = Math.min(Math.max(2, lines), 6);
        wrap.style.display = '';
        btn.innerHTML = _eyeClosed;
        btn.title = 'Hide value (auto-hides in 30s)';

        // Auto-obscure after 30 seconds
        const timerId = setTimeout(() => {
            wrap.style.display = 'none';
            ta.value = '';
            btn.innerHTML = _eyeOpen;
            btn.title = 'Reveal value';
            _revealed.delete(key);
        }, 30_000);

        _revealed.set(key, { timerId });
    });

    // ── Copy ref ──────────────────────────────────────────────────────────────
    on('[data-action="copy-ref"]', 'click', (e, btn) => {
        e.stopPropagation();
        navigator.clipboard?.writeText(btn.dataset.ref)
            .then(() => notify.show('Reference copied', 'success'))
            .catch(() => {});
    });

    // ── Copy revealed value ───────────────────────────────────────────────────
    on('[data-action="copy-value"]', 'click', (e, btn) => {
        e.stopPropagation();
        const key = btn.dataset.key;
        const ta  = query(`.keeper-value[data-key="${key}"]`);
        if (!ta?.value) { notify.show('Reveal the value first', 'info'); return; }
        navigator.clipboard?.writeText(ta.value)
            .then(() => notify.show('Value copied', 'success'))
            .catch(() => {});
    });

    // ── Add ───────────────────────────────────────────────────────────────────
    on('#keeperAddBtn', 'click', () => {
        query('#keeperAddForm').style.display = '';
        query('#keeperNewKey')?.focus();
    });

    on('#keeperCancelAddBtn', 'click', () => {
        query('#keeperAddForm').style.display = 'none';
        query('#keeperNewKey').value = '';
        query('#keeperNewValue').value = '';
        query('#keeperAddError').style.display = 'none';
    });

    on('#keeperSaveBtn', 'click', async (e, btn) => {
        const key   = (query('#keeperNewKey').value   || '').trim();
        const value = (query('#keeperNewValue').value || '').trim();
        const errEl = query('#keeperAddError');
        errEl.style.display = 'none';
        if (!key)          { errEl.textContent = 'Key is required';           errEl.style.display = 'block'; return; }
        if (!value)        { errEl.textContent = 'Value is required';         errEl.style.display = 'block'; return; }
        if (/\s/.test(key)) { errEl.textContent = 'Key cannot contain spaces'; errEl.style.display = 'block'; return; }

        ui.btn.loading(btn, 'Saving…');
        const res = await keeperSet(key, value);
        ui.btn.reset(btn);
        if (res?.key || res?.bytes !== undefined) {
            notify.show(`"${key}" saved`, 'success');
            query('#keeperAddForm').style.display = 'none';
            query('#keeperNewKey').value = '';
            query('#keeperNewValue').value = '';
            loadKeys();
        } else {
            errEl.textContent = res?.error || 'Save failed';
            errEl.style.display = 'block';
        }
    });

    // ── Delete — two-step inline confirm ─────────────────────────────────────
    on('[data-action="delete-key"]', 'click', async (e, btn) => {
        e.stopPropagation();
        const key = btn.dataset.key;
        if (btn.dataset.confirm === '1') {
            ui.btn.loading(btn, '…');
            const res = await keeperDelete(key);
            if (res?.deleted) {
                notify.show(`"${key}" deleted`, 'success');
                _revealed.delete(key);
                loadKeys();
            } else {
                ui.btn.reset(btn);
                btn.dataset.confirm = '';
                notify.show(res?.error || 'Delete failed', 'error');
            }
        } else {
            btn.dataset.confirm = '1';
            btn.textContent = 'Sure?';
            btn.style.background = 'var(--danger)';
            btn.style.color = '#fff';
            btn.style.borderColor = 'var(--danger)';
            setTimeout(() => {
                if (btn.dataset.confirm === '1') {
                    btn.dataset.confirm = '';
                    btn.textContent = 'Delete';
                    btn.style.cssText = 'color:var(--danger);border-color:rgba(255,59,48,0.4);';
                }
            }, 2500);
        }
    });

    component.onUnmount(() => {
        _revealed.forEach(({ timerId }) => clearTimeout(timerId));
        _revealed.clear();
    });
</script>
